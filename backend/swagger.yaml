openapi: 3.0.0
info:
  title: FrodProg API
  version: 1.0.0
  description: API for student management

servers:
  - url: http://localhost:3000

paths:
  /api/students:
    post:
      summary: Create a new student
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Student'
      responses:
        201:
          description: Student created

    get:
      summary: Get all students
      tags:
        - Students
      responses:
        200:
          description: List of students

components:
  schemas:
    Student:
      type: object
      required:
        - fullName
        - grade
      properties:
        fullName:
          type: string
        grade:
          type: string
        parentName:
          type: string
        parentEmail:
          type: string
        parentPhone:
          type: string
        weeklyHours:
          type: number
        notes:
          type: string